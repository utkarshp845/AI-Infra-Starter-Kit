apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sre-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-sre-assistant
  template:
    metadata:
      labels:
        app: ai-sre-assistant
    spec:
      containers:
        - name: ai-sre-assistant
          image: ai-infra-starter-kit/ai-sre-assistant:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: LLM_PROVIDER
              value: none
            - name: OPENAI_BASE_URL
              value: https://api.openai.com/v1
            - name: MODEL_NAME
              value: gpt-4o-mini
            - name: DEMO_SERVICE_LOG_PATH
              value: /shared/logs/demo-service.log
          volumeMounts:
            - name: demo-logs
              mountPath: /shared/logs
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: demo-logs
          persistentVolumeClaim:
            claimName: demo-service-logs
---
apiVersion: v1
kind: Service
metadata:
  name: ai-sre-assistant
spec:
  selector:
    app: ai-sre-assistant
  ports:
    - name: http
      port: 8001
      targetPort: 8001

